<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ISLA - Intelligent Student Learning Assistant</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- TOP NAVBAR -->
  <div class="top-nav">
    <div class="brand">ISLA <span>Assistant</span></div>
    <div class="top-nav-links">
      <a href="index.html" class="nav-link active">Chat</a>
      <a href="quiz.html" class="nav-link">Quiz / Exam</a>
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="history.html" class="nav-link">History</a>
      <a href="flashcards.html" class="nav-link">Flashcards</a>
      <a href="admin.html" class="nav-link">Admin</a>
    </div>
  </div>

  <!-- PAGE CONTENT -->
  <div class="container">
    <h1>ISLA - Intelligent Student Learning Assistant</h1>

    <div id="chat-box">
      <!-- Chat messages will appear here -->
    </div>

    <form id="chat-form">
      <input
        type="text"
        id="user-input"
        placeholder="Type your message... e.g. 'start quiz on recursion'"
        autocomplete="off"
      />
      <button type="submit">Send</button>
    </form>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
