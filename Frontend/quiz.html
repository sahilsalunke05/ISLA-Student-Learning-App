<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ISLA - Quiz / Exam Mode</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- TOP NAVBAR -->
  <div class="top-nav">
    <div class="brand">ISLA <span>Assistant</span></div>
    <div class="top-nav-links">
      <a href="index.html" class="nav-link">Chat</a>
      <a href="quiz.html" class="nav-link active">Quiz / Exam</a>
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="history.html" class="nav-link">History</a>
      <a href="flashcards.html" class="nav-link">Flashcards</a>
      <a href="admin.html" class="nav-link">Admin</a>
    </div>
  </div>

  <!-- PAGE CONTENT -->
  <div class="container">
    <h1>Quiz / Exam Mode</h1>

    <!-- Setup section -->
    <div id="quiz-setup">
      <p>Choose your mode and click <b>Start Quiz</b>.</p>

      <label>
        Subject:
        <select id="subject-select">
          <!-- filled by JS -->
        </select>
      </label>
      <br /><br />

      <label>
        Topic:
        <select id="topic-select">
          <!-- filled by JS -->
        </select>
      </label>
      <br /><br />

      <label>
        Number of questions:
        <input type="number" id="num-questions" value="3" min="1" max="10" />
      </label>
      <br /><br />

      <fieldset>
        <legend>Mode</legend>
        <label>
          <input type="radio" name="mode" value="practice" checked />
          Practice Mode (no timer, no negative marking)
        </label>
        <br />
        <label>
          <input type="radio" name="mode" value="exam" />
          Exam Mode (timer + negative marking)
        </label>
      </fieldset>

      <div id="exam-settings" class="hidden" style="margin-top: 10px;">
        <label>
          Exam duration (minutes):
          <input type="number" id="exam-duration" value="5" min="1" max="180" />
        </label>
        <p style="font-size: 13px; margin-top: 5px;">
          Negative marking: <b>-0.25</b> for each wrong answer.
        </p>
      </div>

      <br />
      <button class="btn btn-primary" id="start-quiz-btn">Start Quiz</button>
    </div>

    <!-- Quiz container -->
    <div id="quiz-container" class="hidden">
      <h2 id="quiz-title"></h2>
      <p id="quiz-meta"></p>
      <p id="timer-display" style="font-weight: bold;"></p>

      <form id="quiz-form">
        <div id="questions-wrapper"></div>
        <button class="btn btn-primary" type="submit">Submit Answers</button>
        <button class="btn btn-secondary" type="button" id="cancel-quiz-btn">
          Cancel
        </button>
      </form>
    </div>

    <div id="quiz-message" style="margin-top: 15px; font-size: 14px;"></div>
  </div>

  <script src="js/quiz.js"></script>
</body>
</html>
